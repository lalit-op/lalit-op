<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>📈 Daily Market Reports</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e3a8a,#0f172a);
    min-height:100vh;
    color:white;
}

.header{
    text-align:center;
    padding:60px 20px;
    background:linear-gradient(
        135deg,
        #2563eb,
        #06b6d4,
        #8b5cf6,
        #ec4899
    );
    background-size:300% 300%;
    animation:gradientMove 8s ease infinite;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.header h1{
    font-size:48px;
    margin-bottom:10px;
}

.header p{
    font-size:18px;
    opacity:.9;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:30px;
}

.latest-banner{
    background:linear-gradient(
        135deg,
        #22c55e,
        #16a34a
    );
    padding:15px;
    border-radius:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    margin-bottom:25px;
    box-shadow:0 5px 20px rgba(34,197,94,.3);
}

.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:20px;
    padding:25px;
    margin-bottom:20px;
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 10px 25px rgba(0,0,0,.4);
}

.card a{
    color:#38bdf8;
    text-decoration:none;
    font-size:24px;
    font-weight:bold;
}

.card a:hover{
    color:#22c55e;
}

.date{
    margin-top:12px;
    color:#cbd5e1;
    font-size:15px;
}

.footer{
    text-align:center;
    padding:30px;
    color:#cbd5e1;
}

.badge{
    display:inline-block;
    padding:6px 12px;
    border-radius:50px;
    background:#f59e0b;
    color:black;
    font-weight:bold;
    margin-bottom:15px;
}
</style>
</head>

<body>

<div class="header">
    <h1>📈 Daily Market Reports</h1>
    <p>AI Powered Stock Market Analysis & News</p>
</div>

<div class="container">

    <div class="latest-banner">
        🚀 Latest Report Available
    </div>

    <div class="card">

        <div class="badge">
            Latest
        </div>

        <br>

        <a href="2026-06-17.html">
            🔥 Daily Market Script - 17 June 2026
        </a>

        <div class="date">
            📅 Published on 17 June 2026
        </div>

    </div>

</div>

<div class="footer">
    ⚡ Powered by Gemini AI • GitHub Pages • Automated Market Reports
</div>

</body>
</html>
