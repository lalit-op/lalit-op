<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Daily Market Reports</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
}

.header{
    text-align:center;
    padding:40px 20px;
    background:linear-gradient(135deg,#2563eb,#06b6d4);
}

.header h1{
    margin:0;
    font-size:42px;
}

.header p{
    opacity:.9;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1e293b;
    border-radius:15px;
    padding:20px;
    margin-bottom:20px;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card a{
    color:#38bdf8;
    text-decoration:none;
    font-size:22px;
    font-weight:bold;
}

.date{
    color:#94a3b8;
    margin-top:10px;
}

.latest{
    border-left:5px solid #22c55e;
}

.footer{
    text-align:center;
    padding:20px;
    color:#94a3b8;
}
</style>
</head>

<body>

<div class="header">
    <h1>📈 Daily Market Reports</h1>
    <p>Latest AI Generated Stock Market Analysis</p>
</div>

<div class="container">

    <div class="card latest">
        <a href="2026-06-17.html">
            🔥 Latest Market Report
        </a>
        <div class="date">17 June 2026</div>
    </div>

</div>

<div class="footer">
    Powered by Gemini + GitHub Pages
</div>

</body>
</html>
