<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Daily Market Reports</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white">

<div class="max-w-4xl mx-auto p-8">

<h1 class="text-5xl font-bold text-center mb-8">
📈 Daily Market Reports
</h1>

<div id="reports"></div>

</div>

<script>
const reports = [
  "2026-06-19.html",
  "2026-06-18.html",
  "2026-06-17.html"
];

const container = document.getElementById("reports");

reports.forEach(file => {
  const date = file.replace(".html","");

  container.innerHTML += `
    <article class="bg-white/10 p-6 rounded-xl mb-4">
      <a href="${file}" class="text-sky-400 text-2xl font-bold">
        🔥 Daily Market Script - ${date}
      </a>
    </article>
  `;
});
</script>

</body>
</html>
