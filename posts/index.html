<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📈 Daily Market Reports</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Keeping your custom animation for the header background */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animate-gradientMove {
            animation: gradientMove 8s ease infinite;
        }
    </style>
</head>

<body class="font-sans min-h-screen bg-gradient-to-br from-[#0f172a] via-[#1e3a8a] to-[#0f172a] text-white antialiased">

    <header class="text-center py-12 px-5 md:py-16 md:px-8 bg-gradient-to-br from-blue-600 via-cyan-500 to-pink-500 bg-[length:300%_300%] animate-gradientMove">
        <!-- Text scales from 3xl on mobile to 5xl on desktop -->
        <h1 class="text-3xl md:text-5xl font-bold mb-2 md:mb-3 leading-tight tracking-tight">
            📈 Daily Market Reports
        </h1>
        <p class="text-base md:text-lg text-white/90 font-medium">
            AI Powered Stock Market Analysis & News
        </p>
    </header>

    <!-- Reduced padding on mobile (px-4), larger on desktop (md:p-8) -->
    <main class="max-w-4xl mx-auto px-4 py-6 md:p-8 w-full">

        <div class="bg-gradient-to-br from-green-500 to-green-600 p-4 md:p-5 rounded-2xl text-center text-lg md:text-xl font-bold mb-6 md:mb-8 shadow-[0_5px_20px_rgba(34,197,94,0.3)]">
            🚀 Latest Report Available
        </div>

        <!-- Card scaling for touch devices -->
        <article class="bg-white/10 backdrop-blur-md border border-white/15 rounded-[20px] p-5 md:p-8 mb-5 transition-all duration-300 hover:-translate-y-2 hover:shadow-[0_10px_25px_rgba(0,0,0,0.4)]">

            <div class="inline-block px-3 py-1.5 md:px-4 md:py-2 rounded-full bg-amber-500 text-black font-bold mb-4 text-xs md:text-sm uppercase tracking-wide">
                Latest
            </div>

            <!-- Block display ensures it's easily tappable on mobile -->
            <a href="2026-06-17.html" class="block text-sky-400 hover:text-green-400 transition-colors text-xl md:text-3xl font-bold mb-3 leading-snug">
                🔥 Daily Market Script - 17 June 2026
            </a>

            <div class="flex items-center text-slate-300 text-sm md:text-base mt-2">
                <span class="mr-2">📅</span> Published on 17 June 2026
            </div>

        </article>

    </main>

    <footer class="text-center p-6 md:p-8 text-slate-400 text-xs md:text-sm border-t border-white/10 mt-auto">
        ⚡ Powered by Gemini AI • GitHub Pages • Automated Market Reports
    </footer>

</body>
</html>
